<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Clicker - neal.fun style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.3);
            animation: bounce-text 2s infinite;
        }

        @keyframes bounce-text {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            color: rgba(255,255,255,0.95);
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .stats-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .stat-item {
            color: white;
            font-size: 1.3em;
            margin: 10px 0;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 2.2em;
            color: #ffff99;
            text-shadow: 2px 2px 8px rgba(255,255,153,0.4);
        }

        .clicker-zone {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
            cursor: pointer;
            perspective: 1000px;
        }

        .meme-button {
            width: 100%;
            height: 100%;
            font-size: 150px;
            background: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .meme-button:active {
            transform: scale(0.92);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .meme-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }

        .floating-text {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            font-size: 1.8em;
            animation: float-up 1s ease-out forwards;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            z-index: 100;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1.3);
            }
        }

        .upgrades-section {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 2px solid rgba(255,255,255,0.3);
            margin-bottom: 20px;
        }

        .upgrades-title {
            color: white;
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .upgrade-btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .upgrade-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .upgrade-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: linear-gradient(135deg, #999999 0%, #666666 100%);
        }

        .upgrade-name {
            display: block;
            font-size: 0.85em;
        }

        .upgrade-cost {
            display: block;
            font-size: 0.75em;
            opacity: 0.9;
        }

        .reset-btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .reset-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .footer {
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
            margin-top: 20px;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: particle-burst 0.8s ease-out forwards;
        }

        @keyframes particle-burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2em;
            }

            .clicker-zone {
                width: 200px;
                height: 200px;
            }

            .meme-button {
                font-size: 100px;
            }

            .upgrades-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <h1>🔓 MEME CLICKER</h1>
        <p class="subtitle">Click the big meme to unlock more memes!</p>

        <div class="stats-box">
            <div class="stat-item">
                <span class="stat-label">Memes Unlocked</span>
                <div class="stat-value" id="memeCount">0</div>
            </div>
            <div class="stat-item">
                <span class="stat-label">Clicks Per Second</span>
                <div class="stat-value" id="cpsDisplay">0</div>
            </div>
        </div>

        <div class="clicker-zone" id="clickerZone">
            <button class="meme-button" id="memeButton">🔓</button>
        </div>

        <div class="upgrades-section">
            <div class="upgrades-title">Upgrades</div>
            <div class="upgrades-grid" id="upgradesGrid"></div>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Game</button>

        <div class="footer">
            <p>Made like neal.fun • Keep clicking!</p>
        </div>
    </div>

    <script>
        const game = {
            memes: 0,
            cps: 0,
            clickValue: 1,
            upgrades: {
                double: { cost: 10, bought: 0, name: "2x Click", multiplier: 2 },
                triple: { cost: 50, bought: 0, name: "3x Click", multiplier: 3 },
                auto: { cost: 100, bought: 0, name: "Auto Clicker", cpsBoost: 1 },
                mega: { cost: 500, bought: 0, name: "MEGA", cpsBoost: 5 },
                godMode: { cost: 1000, bought: 0, name: "God Mode", cpsBoost: 20 }
            },
            emojis: ['🔓', '😂', '💀', '🤯', '🔥', '🎉', '✨', '👑', '💯', '🚀']
        };

        const elements = {
            memeButton: document.getElementById('memeButton'),
            memeCount: document.getElementById('memeCount'),
            cpsDisplay: document.getElementById('cpsDisplay'),
            upgradesGrid: document.getElementById('upgradesGrid'),
            clickerZone: document.getElementById('clickerZone'),
            particles: document.getElementById('particles')
        };

        function loadGame() {
            const saved = localStorage.getItem('memeClickerGame');
            if (saved) {
                Object.assign(game, JSON.parse(saved));
                updateDisplay();
            }
        }

        function saveGame() {
            localStorage.setItem('memeClickerGame', JSON.stringify(game));
        }

        function click() {
            game.memes += game.clickValue;
            updateDisplay();
            saveGame();

            // Create floating text
            createFloatingText(event);
            
            // Create particles
            createParticles();

            // Change emoji
            elements.memeButton.textContent = game.emojis[Math.floor(Math.random() * game.emojis.length)];
        }

        function createFloatingText(event) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.textContent = `+${game.clickValue}`;
            text.style.left = event.clientX + 'px';
            text.style.top = event.clientY + 'px';
            text.style.color = ['#ffff99', '#ff6b9d', '#00ff99', '#ff00ff', '#00ffff'][Math.floor(Math.random() * 5)];
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 1000);
        }

        function createParticles() {
            const rect = elements.memeButton.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = ['⭐', '✨', '💫', '🌟', '💥', '🎆'][Math.floor(Math.random() * 6)];
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                particle.style.fontSize = (20 + Math.random() * 20) + 'px';

                const angle = (Math.PI * 2 * i) / 8;
                const distance = 80 + Math.random() * 40;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');

                elements.particles.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        function updateDisplay() {
            elements.memeCount.textContent = game.memes.toLocaleString();
            elements.cpsDisplay.textContent = game.cps.toFixed(1);
            renderUpgrades();
        }

        function buyUpgrade(key) {
            const upgrade = game.upgrades[key];
            if (game.memes >= upgrade.cost) {
                game.memes -= upgrade.cost;
                upgrade.bought++;

                if (upgrade.multiplier) {
                    game.clickValue *= upgrade.multiplier;
                }
                if (upgrade.cpsBoost) {
                    game.cps += upgrade.cpsBoost;
                }

                updateDisplay();
                saveGame();
                createParticles();
            }
        }

        function renderUpgrades() {
            elements.upgradesGrid.innerHTML = '';
            for (const [key, upgrade] of Object.entries(game.upgrades)) {
                const btn = document.createElement('button');
                btn.className = 'upgrade-btn';
                btn.disabled = game.memes < upgrade.cost;
                btn.onclick = () => buyUpgrade(key);

                const canAfford = game.memes >= upgrade.cost;
                btn.innerHTML = `
                    <span class="upgrade-name">${upgrade.name}</span>
                    <span class="upgrade-cost">$${upgrade.cost}</span>
                `;

                if (upgrade.bought > 0) {
                    btn.innerHTML += `<span style="font-size: 0.75em;">(${upgrade.bought})</span>`;
                }

                elements.upgradesGrid.appendChild(btn);
            }
        }

        function resetGame() {
            if (confirm('Are you sure? This will reset everything!')) {
                localStorage.removeItem('memeClickerGame');
                location.reload();
            }
        }

        // Auto clicker
        setInterval(() => {
            if (game.cps > 0) {
                game.memes += game.cps / 10;
                updateDisplay();
                saveGame();
            }
        }, 100);

        // Initialize
        elements.memeButton.addEventListener('click', click);
        loadGame();
        updateDisplay();
    </script>
</body>
</html>
